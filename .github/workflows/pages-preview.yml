name: Deploy Temporary Pages Preview

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to deploy temporarily to the live Pages URL"
        required: true
        default: "codex/kimi-ui-prod-candidate"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mait-mvp/frontend/package-lock.json

      - name: Install dependencies
        working-directory: mait-mvp/frontend
        run: npm ci

      - name: Build temporary preview
        working-directory: mait-mvp/frontend
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mait-mvp/frontend/dist

      - name: Summarize temporary preview
        run: |
          {
            echo "## Temporary Pages Preview"
            echo
            echo "- Ref: \`${{ inputs.ref }}\`"
            echo
            echo "Warning: this workflow deploys the selected ref to the live GitHub Pages URL temporarily."
            echo "To restore the normal site, re-run the main frontend deploy from \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    environment:
      name: github-pages-preview
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy temporary preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
