name: Build Frontend Preview Artifact

on:
  push:
    branches:
      - "codex/**"
      - "Kimi-Overhaul"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "mait-mvp/frontend/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mait-mvp/frontend/package-lock.json

      - name: Install dependencies
        working-directory: mait-mvp/frontend
        run: npm ci

      - name: Build preview bundle
        working-directory: mait-mvp/frontend
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-${{ github.run_id }}
          path: mait-mvp/frontend/dist
          if-no-files-found: error

      - name: Summarize preview build
        run: |
          {
            echo "## Frontend Preview Artifact"
            echo
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Artifact: \`frontend-preview-${GITHUB_RUN_ID}\`"
            echo
            echo "This workflow builds a deployable preview bundle without touching the live GitHub Pages site."
          } >> "$GITHUB_STEP_SUMMARY"
